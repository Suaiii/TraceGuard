# ==============================================================================
# TraceGuard 默认配置文件
# Phase 5: 统一管理所有可配置参数
# ==============================================================================

# ------------------------------------------------------------------------------
# 检测模块 (上游)
# ------------------------------------------------------------------------------
detection:
  checkpoint_path: "auto"                   # server.py 自动查找 checkpoints/best.pth 或 best.pth
  device: "cuda"                           # cuda | cpu

# ------------------------------------------------------------------------------
# 可解释热力图
# ------------------------------------------------------------------------------
heatmap:
  method: "gradcam"                        # Grad-CAM on stage2 (384ch x 14x14)
  overlay_alpha: 0.5                       # 热力图叠加透明度 (0~1)
  smooth_sigma: 3.0                        # 高斯平滑标准差

# ------------------------------------------------------------------------------
# 篡改可疑区域定位
# ------------------------------------------------------------------------------
localization:
  enable: true                             # 是否启用定位模块
  enable_patch: true                       # 启用滑动窗口检测
  enable_feature: true                     # 启用特征统计辅助
  patch_weight: 0.4                        # patch 方法融合权重
  feature_weight: 0.6                      # 特征方法融合权重
  scales: [224, 160]                       # 滑动窗口尺寸列表
  stride_ratio: 0.5                        # 步长/窗口比例
  batch_size: 32                           # 批处理 patch 数量
  max_dim: 500                             # 大图降采样最大边长
  confidence_floor: 0.35                   # 低于此 fake_prob 的 patch 分数置零
  threshold_method: "percentile"           # otsu | percentile
  threshold_percentile: 90                 # 百分位阈值 (threhold_method=percentile)
  min_region_area: 256                     # 最小可疑区域面积 (px)
  nms_iou_threshold: 0.3                   # NMS IoU 合并阈值
  open_radius: 3                           # 形态学开运算半径
  close_radius: 5                          # 形态学闭运算半径

# ------------------------------------------------------------------------------
# 风险评分
# ------------------------------------------------------------------------------
risk:
  weights:
    fake_prob: 0.30                        # 检测置信度
    artifact_intensity: 0.25               # 伪影强度
    tamper_area: 0.25                      # 篡改面积比
    region_count: 0.10                     # 区域数量
    consistency: 0.10                      # 一致性重叠
  levels:
    low: [0.0, 0.35]                       # 低风险区间
    medium: [0.35, 0.70]                   # 中风险区间
    high: [0.70, 1.00]                     # 高风险区间

# ------------------------------------------------------------------------------
# 自然语言解释
# ------------------------------------------------------------------------------
text:
  language: "zh"                           # zh | en
  detail_level: "standard"                 # brief | standard | detailed

# ------------------------------------------------------------------------------
# 输出控制
# ------------------------------------------------------------------------------
output:
  save_images: true                        # 保存解码图片到磁盘
  format: "PNG"                            # 输出图片格式
  html_title: "TraceGuard 检测报告"        # HTML 报告标题
